<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Printing Error - The Birthday Times</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IM+Fell+English&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="error-page">
    <div class="container">
        <header class="masthead">
            <h1>PRINTING ERROR</h1>
            <p class="tagline">Our presses have encountered an unexpected issue.</p>
        </header>

        <div class="error-content">
            <p>The archives are currently jammed in the printing press. Please forgive the ink spills and try again shortly.</p>
        </div>

        <div class="action-bar">
            <a href="/" class="ink-button btn-link">Return to the Newsroom</a>
        </div>
    </div>
</body>
</html>
